services:
  db:
    image: pgvector/pgvector:pg16
    labels:
      org.springframework.boot.service-connection: "postgres"
    env_file: .env
    ports:
      - "5431:5432"
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8.4.0
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
  worker:
    build: ./worker
    restart: always
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - HF_HOME=/data/huggingface
    env_file:
      - .env
    volumes:
      - ./worker:/app
      - /mnt/c/Users/${WINDOWS_USER}/.cache/huggingface:/data/huggingface

volumes:
    pg_data:
    redis_data:
